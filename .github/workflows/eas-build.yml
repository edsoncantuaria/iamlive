# Build EAS manual — requer segredo EXPO_TOKEN no repositório GitHub.
# Ver: apps/mobile/store/SUBMIT.md

name: EAS Build

on:
  workflow_dispatch:
    inputs:
      profile:
        description: Perfil eas.json
        required: true
        default: preview
        type: choice
        options:
          - preview
          - production
      platform:
        description: Plataforma
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Instalar EAS CLI
        run: npm install -g eas-cli@latest

      - name: EAS Build
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --non-interactive --profile ${{ github.event.inputs.profile }} --platform ${{ github.event.inputs.platform }}
